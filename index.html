		<style>
			/* 微信/QQ 屏蔽层样式 */
			#shield-layer {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.9);
				backdrop-filter: blur(15px);
				z-index: 20000;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				padding: 20px;
				box-sizing: border-box;
				color: white;
				text-align: center;
				font-family: sans-serif;
			}

			.shield-content {
				background: rgba(255, 255, 255, 0.1);
				border: 1px solid rgba(255, 255, 255, 0.2);
				padding: 30px;
				border-radius: 20px;
				max-width: 400px;
				animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
			}

			.shield-icon {
				font-size: 50px;
				margin-bottom: 20px;
			}

			@keyframes bounceIn {
				0% { opacity: 0; transform: scale(0.3); }
				50% { opacity: 1; transform: scale(1.05); }
				70% { transform: scale(0.9); }
				100% { transform: scale(1); }
			}
		</style>
		<script>
			// 深度流氓浏览器检测与反制
			(function() {
				const ua = navigator.userAgent.toLowerCase();
				const isWechat = /micromessenger/i.test(ua);
				const isQQ = /qq/i.test(ua);
				const isQQBrowser = /mqqbrowser|qqbrowser/i.test(ua);
				const isBaidu = /baidubrowser|bidubrowser/i.test(ua);
				const is360 = /qihu|360ee|360se|360browser|qihoo|qhbrowser/i.test(ua) || (function() {
					// 深度特征检测：360在内核中通常会残留一些特有属性
					if (window.chrome) {
						// 360极速版/安全版特有的一些 mimeTypes 特征
						for (let i in navigator.mimeTypes) {
							if (navigator.mimeTypes[i].type == 'application/gameplugin') return true;
						}
					}
					return false;
				})();
				
				if (isWechat || isQQ || isQQBrowser) {
					document.documentElement.style.overflow = 'hidden';
					window.isRogueBrowser = true;
					window.addEventListener('DOMContentLoaded', () => {
						const layer = document.getElementById('shield-layer');
						if (layer) layer.style.display = 'flex';
					});
				}
			})();

			// 执行复制并显示指引
			function handleSafeJump(event) {
				const url = window.location.href;
				const btn = document.getElementById('jump-btn');
				
				// 复制链接
				const input = document.createElement('textarea');
				input.value = url;
				document.body.appendChild(input);
				input.select();
				document.execCommand('copy');
				document.body.removeChild(input);

				if (btn) {
					btn.innerHTML = '<span style="display:block;line-height:1.2;">已复制并尝试跳转</span><span style="display:block;font-size:12px;opacity:0.8;margin-top:4px;">若无反应请点右上角打开</span>';
					btn.style.background = '#10b981';
				}

				// 智能识别环境并显示指引
				const ua = navigator.userAgent.toLowerCase();
				const isSocial = ua.indexOf('micromessenger') > -1 || ua.indexOf('qq/') > -1;
				const guide = document.getElementById('wechat-guide');
				const guideText = document.getElementById('guide-text');
				const guideArrow = document.getElementById('guide-arrow');

				if (guide) {
					guide.style.display = 'block';
					if (isSocial) {
						// 微信/QQ 环境：指点右上角
						if (guideText) guideText.innerHTML = '<p style="font-size:20px;font-weight:800;margin-bottom:10px;">点击右上角菜单</p><p style="font-size:16px;opacity:0.8;">选择“在浏览器中打开”</p>';
						if (guideArrow) guideArrow.style.display = 'block';
					} else {
						// QQ浏览器/360 等：引导手动粘贴
						if (guideText) guideText.innerHTML = '<p style="font-size:20px;font-weight:800;margin-bottom:10px;">链接已成功复制</p><p style="font-size:16px;opacity:0.8;">请手动打开 Chrome 或系统浏览器<br>并在地址栏粘贴访问</p>';
						if (guideArrow) guideArrow.style.display = 'none';
					}
				}
				
				// 尝试唤起 (Android)
				setTimeout(() => {
					if (ua.indexOf('android') > -1) {
						window.location.href = `intent://${window.location.host}${window.location.pathname}#Intent;scheme=https;package=com.android.browser;end`;
					}
				}, 100);
			}
		</script>
