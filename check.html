<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Redirect</title>
    <style>
        /* 基本全局样式 */
        body {
            background: #0f172a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 微信/QQ/流氓浏览器 屏蔽层样式 */
        #shield-layer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 20000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            text-align: center;
        }

        .shield-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 30px;
            max-width: 450px;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* 动态背景粒子效果 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.1)"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/></circle><circle cx="80" cy="40" r="1" fill="rgba(255,255,255,0.1)"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/></circle><circle cx="40" cy="80" r="1" fill="rgba(255,255,255,0.1)"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/></circle></svg>') repeat;
            animation: float 20s linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            100% {
                transform: translateY(-100px);
            }
        }

        /* 居中内容的样式 */
        .center-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            max-width: 700px;
            width: 90%;
            box-sizing: border-box;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            animation: slideInUp 1s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0 0 20px 0;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
            line-height: 1.2;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            }

            to {
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6));
            }
        }

        .status-container {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #timer {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.8;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border-radius: 2px;
            animation: progress 3s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }

            50% {
                width: 70%;
            }

            100% {
                width: 100%;
            }
        }

        .decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        .decoration:nth-child(1) {
            top: -50px;
            right: -50px;
            animation-delay: 0s;
        }

        .decoration:nth-child(2) {
            bottom: -50px;
            left: -50px;
            animation-delay: 5s;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            #timer {
                font-size: 1rem;
            }

            .center-content {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
    <script>
        // 深度流氓浏览器检测与反制
        (function() {
            const ua = navigator.userAgent.toLowerCase();
            const isWechat = /micromessenger/i.test(ua);
            const isQQ = /qq/i.test(ua);
            const isQQBrowser = /mqqbrowser|qqbrowser/i.test(ua);
            const isBaidu = /baidubrowser|bidubrowser/i.test(ua);
            const is360 = /qihu|360ee|360se|360browser|qihoo|qhbrowser/i.test(ua) || (function() {
                if (window.chrome) {
                    for (let i in navigator.mimeTypes) {
                        if (navigator.mimeTypes[i].type == 'application/gameplugin') return true;
                    }
                }
                return false;
            })();
            
            if (isWechat || isQQ || isQQBrowser) {
                document.documentElement.style.overflow = 'hidden';
                window.isRogueBrowser = true; // 标记流氓浏览器，阻止后续 logic
                window.addEventListener('DOMContentLoaded', () => {
                    const layer = document.getElementById('shield-layer');
                    if (layer) layer.style.display = 'flex';
                    // 显示当前链接供复制
                    document.getElementById('display-url-check').innerText = window.location.href;
                });
            }
        })();

        // 执行复制并显示指引
        function handleSafeJumpCheck(event) {
            const url = window.location.href;
            const btn = document.getElementById('jump-btn-check');
            
            const input = document.createElement('textarea');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);

            if (btn) {
                btn.innerHTML = '<span style="display:block;line-height:1.2;">已复制并尝试跳转</span><span style="display:block;font-size:12px;opacity:0.8;margin-top:4px;">若无反应请点右上角打开</span>';
                btn.style.background = '#10b981';
            }

            // 智能识别环境并显示指引
            const ua = navigator.userAgent.toLowerCase();
            const isSocial = ua.indexOf('micromessenger') > -1 || ua.indexOf('qq/') > -1;
            const guide = document.getElementById('wechat-guide-check');
            const guideText = document.getElementById('guide-text-check');
            const guideArrow = document.getElementById('guide-arrow-check');

            if (guide) {
                guide.style.display = 'block';
                if (isSocial) {
                    if (guideText) guideText.innerHTML = '<p style="font-size:20px;font-weight:800;margin-bottom:10px;">点击右上角菜单</p><p style="font-size:16px;opacity:0.8;">选择“在浏览器中打开”</p>';
                    if (guideArrow) guideArrow.style.display = 'block';
                } else {
                    if (guideText) guideText.innerHTML = '<p style="font-size:20px;font-weight:800;margin-bottom:10px;">链接已成功复制</p><p style="font-size:16px;opacity:0.8;">请手动打开 Chrome 或系统浏览器<br>并在地址栏粘贴访问</p>';
                    if (guideArrow) guideArrow.style.display = 'none';
                }
            }

            // 尝试唤起系统浏览器 (Android)
            setTimeout(() => {
                if (ua.indexOf('android') > -1) {
                    window.location.href = `intent://${window.location.host}${window.location.pathname}#Intent;scheme=https;package=com.android.browser;end`;
                }
            }, 100);
        }
    </script>
    <script>
        const CONFIG = {
            cnPool: [
                'aHR0cHM6Ly95b3V4dWFuLjg4ODU1NjY2Lnh5eg==',
                'aHR0cHM6Ly9lLWNvbW1lcmNlLXZpZS44ODg1NTY2Ni54eXo=',
                'aHR0cHM6Ly9lLWNvbW1lcmNlLXl5Ljg4ODU1NjY2Lnh5eg==',
                'aHR0cHM6Ly9kZWZhdWx0Ljg4ODU1NjY2Lnh5eg=='
            ],
            overseasPool: [
                'aHR0cHM6Ly9oay50aWFucXVlZ2UudG9w',
                'aHR0cHM6Ly9qcC50aWFucXVlZ2UudG9w',
                'aHR0cHM6Ly9zZy50aWFucXVlZ2UudG9w',
                'aHR0cHM6Ly91cy50aWFucXVlZ2UudG9w'
            ],
            defaultUrl: 'aHR0cHM6Ly9oay50aWFucXVlZ2UudG9w',
            ipApis: [
                'https://ipapi.co/json/',
                'https://ipinfo.io/json'
            ],
            timeout: 3000
        };

        if (!Promise.any) {
            Promise.any = function (promises) {
                return new Promise((resolve, reject) => {
                    let errors = [];
                    let remaining = promises.length;
                    if (remaining === 0) reject(new Error('All rejected'));
                    promises.forEach(p => {
                        Promise.resolve(p).then(resolve).catch(e => {
                            errors.push(e);
                            if (--remaining === 0) reject(errors);
                        });
                    });
                });
            };
        }

        async function fetchWithTimeout(url, timeout) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timer);
                return response;
            } catch (e) {
                clearTimeout(timer);
                throw e;
            }
        }

        function probe(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const start = Date.now();
                img.onload = img.onerror = () => resolve({ url, time: Date.now() - start });
                img.src = `${url}/favicon.ico?t=${start}`;
                setTimeout(() => reject(new Error('timeout')), CONFIG.timeout);
            });
        }

        async function initRedirect() {
            if (window.isRogueBrowser) return; // 如果是流氓浏览器，直接中断所有后续操作
            
            const timer = document.getElementById("timer");
            const spinner = document.querySelector('.loading-spinner');

            // 1. 获取地理位置
            let countryCode = 'CN';
            try {
                timer.innerText = "正在分析网络环境...";
                countryCode = await Promise.any(CONFIG.ipApis.map(api =>
                    fetchWithTimeout(api, 2000).then(r => r.json()).then(d => (d.country_code || d.country || 'CN').toUpperCase())
                ));
            } catch (e) {
                console.warn("IP 检测超时，使用默认配置");
            }

            // 2. 选择 Pool 并进行“地域对号入座”排序
            let encodedPool = (countryCode === 'CN') ? CONFIG.cnPool : CONFIG.overseasPool;
            let decodedPool = encodedPool.map(d => atob(d));

            // --- 精准地域匹配逻辑 ---
            if (countryCode !== 'CN') {
                const prefix = countryCode.toLowerCase() + '.'; // 例如 'hk.'
                const matched = decodedPool.filter(url => url.includes('://' + prefix));
                const others = decodedPool.filter(url => !url.includes('://' + prefix));
                decodedPool = [...matched, ...others]; // 把匹配地域的域名提到最前面
            }

            // 3. 智能记忆 (作为第二优先级)
            const lastWin = localStorage.getItem('last_success_domain');
            if (lastWin && decodedPool.includes(lastWin)) {
                // 如果记忆域名不是当前的地域匹配域名，则把它放在匹配域名之后
                const matchedUrl = decodedPool[0];
                if (lastWin !== matchedUrl) {
                    decodedPool = [matchedUrl, lastWin, ...decodedPool.filter(d => d !== lastWin && d !== matchedUrl)];
                }
            }

            timer.innerText = countryCode === 'CN' ? "正在为您挑选最快的国内线路..." : "正在连接全球加速网络...";

            // 4. 并发测速竞速
            try {
                const winner = await Promise.any(decodedPool.map(url => probe(url)));
                localStorage.setItem('last_success_domain', winner.url);
                timer.innerText = "找到最佳线路，正在进入...";
                spinner.style.display = 'none';
                window.location.href = winner.url;
            } catch (e) {
                window.location.href = decodedPool[0] || atob(CONFIG.defaultUrl);
            }
        }

        document.addEventListener('DOMContentLoaded', initRedirect);
    </script>
</head>

<body>
    <!-- 微信/QQ/流氓浏览器 屏蔽层 -->
    <div id="shield-layer">
        <!-- 智能指引层 -->
        <div id="wechat-guide-check" style="display: none; position: fixed; top: 0; right: 0; left: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 20001; cursor: pointer;" onclick="this.style.display='none'">
            <div id="guide-text-check" style="position: absolute; top: 20%; left: 0; right: 0; text-align: center; color: white; padding: 0 40px;">
                <!-- 动态插入文案 -->
            </div>
            <div id="guide-arrow-check" style="position: absolute; top: 20px; right: 30px; text-align: right;">
                <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: bounce 1s infinite alternate;"><path d="M17 7l-10 10"></path><path d="M16 7l1 0l0 1"></path><path d="M7 16l0 1l1 0"></path><path d="M17 7l-5 0"></path><path d="M17 7l0 5"></path></svg>
            </div>
            <style>
                @keyframes bounce { from { transform: translateY(0) scale(1); } to { transform: translateY(15px) scale(1.2); } }
            </style>
        </div>

        <div class="shield-content" style="position: relative; z-index: 20000;">
            <div style="font-size: 50px; margin-bottom: 20px; color: #ef4444;">⚠️</div>
            <h2 style="margin-top: 0; color: white; font-size: 24px; font-weight: 800;">安全访问提醒</h2>
            <p style="font-size: 1.05rem; line-height: 1.6; color: #cbd5e1; margin-bottom: 25px;">为了您的账户安全，建议点击下方按钮并切换至 Chrome 或系统浏览器访问。</p>
            
            <div style="display: none;">
                <span id="display-url-check"></span>
            </div>

            <a id="jump-btn-check" href="javascript:void(0)" onclick="handleSafeJumpCheck(event)" style="text-decoration: none; width: 100%; min-height: 64px; padding: 12px 20px; border-radius: 20px; background: #3b82f6; color: white; border: none; font-weight: 700; font-size: 18px; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;">
                一键安全打开
            </a>

            <div style="margin-top: 25px; display: flex; justify-content: center; gap: 20px; opacity: 0.6;">
                <span style="font-size: 12px; color: white;">Chrome</span>
                <span style="font-size: 12px; color: white;">Edge</span>
                <span style="font-size: 12px; color: white;">Safari</span>
            </div>
        </div>
    </div>

    <div class="center-content">
        <div class="decoration"></div>
        <div class="decoration"></div>
        <h1>欢迎来到天阙</h1>
        <p style="font-size: 1.1rem; margin: 10px 0; opacity: 0.9;">正在为您挑选合适线路并自动跳转载入</p>
        <div class="status-container">
            <div class="loading-spinner"></div>
            <p id="timer">正在初始化...</p>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>
</body>

</html>
